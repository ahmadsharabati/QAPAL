<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QAPAL Pipeline Fixture</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    form { display: flex; flex-direction: column; gap: 12px; max-width: 300px; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background: #0066cc; color: white; border: none;
             border-radius: 4px; cursor: pointer; }
    #status { margin-top: 16px; padding: 12px; border-radius: 4px; display: none; }
    #status.success { background: #d4edda; color: #155724; }
    #status.error   { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <nav>
    <a href="#home"  data-testid="nav-home">Home</a> |
    <a href="#about" data-testid="nav-about">About</a>
  </nav>

  <main>
    <h1>QAPAL Test App</h1>
    <p>A deterministic fixture for end-to-end pipeline tests.</p>

    <form id="login-form" aria-label="Login form">
      <label for="email">Email</label>
      <input id="email"    data-testid="email"    type="email"
             placeholder="user@example.com" aria-label="Email" required>

      <label for="password">Password</label>
      <input id="password" data-testid="password" type="password"
             placeholder="Password" aria-label="Password" required>

      <button type="submit" data-testid="login-btn">Sign In</button>
    </form>

    <div id="status" data-testid="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var status = document.getElementById('status');
      status.style.display = 'block';
      if (email.indexOf('@') !== -1) {
        status.className = 'success';
        status.textContent = 'Welcome, ' + email;
      } else {
        status.className = 'error';
        status.textContent = 'Invalid email address';
      }
    });
  </script>
</body>
</html>
